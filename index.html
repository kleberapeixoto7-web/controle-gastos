<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c10">
<title>MeuGasto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  --bg:       #0a0c10;
  --s1:       #13161f;
  --s2:       #1a1e2a;
  --s3:       #222737;
  --border:   #2a2f3e;
  --green:    #00d68f;
  --red:      #ff5c6a;
  --yellow:   #ffcb47;
  --blue:     #4d9fff;
  --text:     #f0f2f8;
  --sub:      #6b748a;
  --font:     'Plus Jakarta Sans', sans-serif;
  --r:        18px;
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  height: 100%; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── SHELL ── */
#app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

/* ── STATUS AREA ── */
.status-bar { height: env(safe-area-inset-top, 0px); background: var(--bg); flex-shrink: 0; }

/* ── HEADER ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 10px;
  flex-shrink: 0;
}
.logo { font-size: 1.25rem; font-weight: 800; color: var(--green); letter-spacing: -0.5px; }
.month-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 99px; padding: 6px 14px;
  font-size: 0.82rem; font-weight: 600; color: var(--text);
  cursor: pointer; user-select: none;
}

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 0 16px 16px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── PAGES ── */
.page { display: none; animation: fadeUp .25s ease; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

/* ── BOTTOM NAV ── */
.bottom-nav {
  display: flex;
  background: var(--s1);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 4px; gap: 4px;
  background: none; border: none; cursor: pointer;
  color: var(--sub); font-family: var(--font); font-size: 0.7rem; font-weight: 600;
  transition: color .15s;
}
.nav-btn .icon { font-size: 1.35rem; transition: transform .2s; }
.nav-btn.active { color: var(--green); }
.nav-btn.active .icon { transform: translateY(-2px); }

/* ── HERO BALANCE ── */
.hero {
  background: linear-gradient(135deg, #0f1a2e 0%, #0d1520 100%);
  border: 1px solid #1a2744;
  border-radius: var(--r);
  padding: 22px 20px;
  margin-bottom: 14px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(0,214,143,.12) 0%, transparent 70%);
  border-radius: 50%;
}
.hero-label { font-size: 0.72rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; }
.hero-value { font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: var(--green); line-height: 1; }
.hero-row { display: flex; justify-content: space-between; margin-top: 18px; }
.hero-mini { text-align: center; }
.hero-mini-label { font-size: 0.7rem; color: var(--sub); margin-bottom: 2px; }
.hero-mini-val { font-size: 0.95rem; font-weight: 700; }

/* ── PROGRESS ── */
.prog-wrap { margin-bottom: 14px; }
.prog-head { display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 6px; font-weight: 500; }
.prog-track { height: 8px; background: var(--s2); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; transition: width .7s cubic-bezier(.4,0,.2,1); }

/* ── MINI CARDS ROW ── */
.mini-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.mini-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px;
}
.mini-card-label { font-size: 0.7rem; color: var(--sub); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.mini-card-val { font-size: 1.05rem; font-weight: 700; }

/* ── CHART CARD ── */
.chart-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px; margin-bottom: 14px;
}
.chart-card-title { font-size: 0.82rem; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; }
.chart-card canvas { max-height: 200px; width: 100% !important; }

/* ── MONTH SCROLL ── */
.month-scroll-wrap { overflow-x: auto; margin-bottom: 16px; }
.month-scroll-wrap::-webkit-scrollbar { display: none; }
.month-scroll { display: flex; gap: 8px; padding-bottom: 2px; width: max-content; }
.m-tab {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 14px;
  font-size: 0.78rem; font-weight: 600; color: var(--sub);
  cursor: pointer; transition: all .15s; white-space: nowrap;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.m-tab.active { background: var(--green); color: #000; border-color: var(--green); }
.m-tab-count { font-size: 0.62rem; font-weight: 700; opacity: .6; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(70px + var(--safe-bot) + 14px); right: 18px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--green); color: #000;
  border: none; font-size: 1.5rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 20px rgba(0,214,143,.4);
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s, box-shadow .2s;
  z-index: 200;
}
.fab:active { transform: scale(.92); box-shadow: 0 2px 10px rgba(0,214,143,.3); }

/* ── BOTTOM SHEET ── */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 300; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--s1); border-radius: 24px 24px 0 0;
  border-top: 1px solid var(--border);
  padding: 0 20px calc(20px + var(--safe-bot));
  z-index: 301;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
  max-height: 90dvh; overflow-y: auto;
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 12px auto 20px; }
.sheet-title { font-size: 1rem; font-weight: 800; margin-bottom: 20px; }

/* ── FORM ── */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 0.72rem; color: var(--sub); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; font-weight: 600; }
.field input, .field select {
  width: 100%; background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 13px 14px;
  color: var(--text); font-family: var(--font); font-size: 1rem;
  outline: none; transition: border-color .2s; -webkit-appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--green); }
.field select option { background: var(--s2); }
.fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-save {
  width: 100%; padding: 15px; background: var(--green); color: #000;
  border: none; border-radius: 14px; font-family: var(--font);
  font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 4px;
  transition: opacity .15s;
}
.btn-save:active { opacity: .85; }

/* ── SETTINGS SHEET ── */
.settings-field { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
.settings-label { font-size: 0.88rem; font-weight: 600; }
.settings-input {
  background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 8px 12px; color: var(--text); font-family: var(--font); font-weight: 700;
  font-size: 0.95rem; width: 130px; text-align: right; outline: none;
}
.settings-input:focus { border-color: var(--green); }

/* ── GASTO LIST ── */
.gasto-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid var(--border);
  animation: fadeUp .2s ease;
}
.gasto-icon {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}
.gasto-info { flex: 1; min-width: 0; }
.gasto-desc { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gasto-meta { font-size: 0.72rem; color: var(--sub); margin-top: 2px; }
.gasto-val { font-size: 0.95rem; font-weight: 700; color: var(--red); flex-shrink: 0; }
.gasto-del { background: none; border: none; color: var(--sub); font-size: 1rem; cursor: pointer; padding: 4px 8px; margin-left: 2px; flex-shrink: 0; }
.gasto-del:active { color: var(--red); }

/* ── CAT CHIPS ── */
.cat-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.cat-chip {
  padding: 5px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 600;
  border: 1.5px solid transparent; cursor: pointer; transition: all .15s;
  background: var(--s2); color: var(--sub);
}
.cat-chip.active { background: transparent; }

/* ── SECTION TITLE ── */
.sec-title { font-size: 0.72rem; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 1.2px; margin: 18px 0 10px; }

/* ── ANNUAL CAT ROW ── */
.ann-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.ann-cat { min-width: 130px; font-size: 0.85rem; font-weight: 600; }
.ann-bar-wrap { flex: 1; }
.ann-bar { height: 6px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.ann-bar-fill { height: 100%; border-radius: 99px; }
.ann-val { font-size: 0.82rem; font-weight: 700; text-align: right; min-width: 80px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(74px + var(--safe-bot) + 8px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--s3); border: 1px solid var(--border);
  color: var(--text); padding: 10px 20px; border-radius: 99px;
  font-size: 0.84rem; font-weight: 600; z-index: 999;
  opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 40px 0; color: var(--sub); }
.empty .ei { font-size: 2.5rem; margin-bottom: 10px; }
.empty p { font-size: 0.85rem; line-height: 1.6; }

/* ── EXPORT BTN ── */
.btn-export {
  width: 100%; padding: 13px; background: var(--s2); color: var(--text);
  border: 1px solid var(--border); border-radius: 12px; font-family: var(--font);
  font-size: 0.88rem; font-weight: 600; cursor: pointer; margin-top: 12px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-export:active { background: var(--s3); }
</style>
</head>
<body>

<div id="app">
  <div class="status-bar"></div>

  <div class="topbar">
    <div class="logo">💰 MeuGasto</div>
    <div class="month-pill" onclick="openSettings()">
      <span id="monthPillText">Jan 2025</span>
      <span style="color:var(--sub)">⚙️</span>
    </div>
  </div>

  <div class="scroll-area" id="scrollArea">

    <!-- ══ HOME ══ -->
    <div class="page active" id="page-home">
      <div class="hero" id="heroCard"></div>
      <div class="prog-wrap" id="progWrap"></div>
      <div class="mini-cards" id="miniCards"></div>
      <div class="chart-card">
        <div class="chart-card-title">Gastos por Categoria</div>
        <canvas id="pieChart"></canvas>
        <div id="pieEmpty" class="empty" style="display:none">
          <div class="ei">🍩</div><p>Adicione gastos para ver o gráfico</p>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Evolução Mensal</div>
        <canvas id="lineChart"></canvas>
      </div>
    </div>

    <!-- ══ LANÇAMENTOS ══ -->
    <div class="page" id="page-lancamentos">
      <div class="month-scroll-wrap">
        <div class="month-scroll" id="monthTabs"></div>
      </div>
      <div class="sec-title" id="lancTitle">Janeiro — 0 gastos</div>
      <div class="cat-chips" id="filterChips"></div>
      <div id="gastosList"></div>
      <button class="btn-export" onclick="exportCSV()">⬇️ Exportar CSV do Mês</button>
    </div>

    <!-- ══ ANUAL ══ -->
    <div class="page" id="page-anual">
      <div class="mini-cards" id="anualCards"></div>
      <div class="chart-card">
        <div class="chart-card-title">Gastos x Economia — Ano Completo</div>
        <canvas id="barChart"></canvas>
      </div>
      <div class="sec-title">Por Categoria no Ano</div>
      <div id="annualCats"></div>
      <button class="btn-export" onclick="exportCSVAnual()">⬇️ Exportar CSV Anual</button>
    </div>

  </div><!-- /scroll-area -->

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')">
      <span class="icon">🏠</span>Home
    </button>
    <button class="nav-btn" id="nav-lancamentos" onclick="showPage('lancamentos')">
      <span class="icon">📋</span>Gastos
    </button>
    <button class="nav-btn" id="nav-anual" onclick="showPage('anual')">
      <span class="icon">📅</span>Anual
    </button>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddSheet()">+</button>

<!-- Overlay -->
<div class="sheet-overlay" id="overlay" onclick="closeSheets()"></div>

<!-- ══ ADD SHEET ══ -->
<div class="sheet" id="addSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">➕ Novo Gasto</div>
  <div class="field">
    <label>Descrição</label>
    <input type="text" id="fDesc" placeholder="Ex: Conta de luz, Gasolina...">
  </div>
  <div class="fields-row">
    <div class="field">
      <label>Data</label>
      <input type="date" id="fData">
    </div>
    <div class="field">
      <label>Valor (R$)</label>
      <input type="number" id="fValor" placeholder="0,00" inputmode="decimal" min="0" step="0.01">
    </div>
  </div>
  <div class="fields-row">
    <div class="field">
      <label>Categoria</label>
      <select id="fCat">
        <option>🚗 Transporte</option>
        <option>📚 Educação</option>
        <option>💳 Cartões</option>
        <option>🏋️ Saúde</option>
        <option>🎉 Lazer</option>
        <option>🍔 Alimentação</option>
        <option>🏠 Moradia</option>
        <option>🔧 Outros</option>
      </select>
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="fTipo">
        <option>Fixo</option>
        <option>Variável</option>
      </select>
    </div>
  </div>
  <button class="btn-save" onclick="addGasto()">Salvar Gasto</button>
</div>

<!-- ══ SETTINGS SHEET ══ -->
<div class="sheet" id="settingsSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">⚙️ Configurações</div>
  <div class="settings-field">
    <div class="settings-label">💼 Salário Mensal</div>
    <input class="settings-input" type="number" id="sSalario" inputmode="decimal" placeholder="2900">
  </div>
  <div class="settings-field">
    <div class="settings-label">🎯 Meta de Economia</div>
    <input class="settings-input" type="number" id="sMeta" inputmode="decimal" placeholder="800">
  </div>
  <div class="settings-field">
    <div class="settings-label">📅 Ano</div>
    <input class="settings-input" type="number" id="sAno" inputmode="numeric" placeholder="2025">
  </div>
  <button class="btn-save" style="margin-top:20px" onclick="saveSettings()">Salvar</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const MN = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MF = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CC = {
  '🚗 Transporte':'#4d9fff','📚 Educação':'#b36bff','💳 Cartões':'#ff5c6a',
  '🏋️ Saúde':'#00d68f','🎉 Lazer':'#ff8c42','🍔 Alimentação':'#ffcb47',
  '🏠 Moradia':'#06d6c7','🔧 Outros':'#6b748a'
};

let gastos  = JSON.parse(localStorage.getItem('mg2_gastos') || '[]');
let cfg     = JSON.parse(localStorage.getItem('mg2_cfg')    || '{"sal":2900,"meta":800,"ano":'+new Date().getFullYear()+'}');
let selMon  = new Date().getMonth();
let filterCat = null;
let charts  = {};

function save()    { localStorage.setItem('mg2_gastos', JSON.stringify(gastos)); }
function saveCfg() { localStorage.setItem('mg2_cfg',    JSON.stringify(cfg)); }

// ── BOOT ─────────────────────────────────────────────────────
window.addEventListener('load', () => {
  document.getElementById('fData').value = todayStr();
  document.getElementById('sSalario').value = cfg.sal;
  document.getElementById('sMeta').value    = cfg.meta;
  document.getElementById('sAno').value     = cfg.ano;
  updatePill();
  renderAll();
});

// ── NAV ──────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  document.getElementById('scrollArea').scrollTop = 0;
  if (id === 'anual') renderAnual();
  if (id === 'lancamentos') { renderMonthTabs(); renderList(); }
}

// ── SHEETS ───────────────────────────────────────────────────
function openAddSheet() {
  document.getElementById('addSheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fDesc').focus(), 300);
}
function openSettings() {
  document.getElementById('settingsSheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeSheets() {
  document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
  document.getElementById('overlay').classList.remove('open');
}
function saveSettings() {
  cfg.sal  = parseFloat(document.getElementById('sSalario').value) || cfg.sal;
  cfg.meta = parseFloat(document.getElementById('sMeta').value)    || cfg.meta;
  cfg.ano  = parseInt(document.getElementById('sAno').value)       || cfg.ano;
  saveCfg(); updatePill(); renderAll(); closeSheets();
  showToast('✅ Configurações salvas!');
}

// ── ADD GASTO ────────────────────────────────────────────────
function addGasto() {
  const data  = document.getElementById('fData').value;
  const desc  = document.getElementById('fDesc').value.trim();
  const valor = parseFloat(document.getElementById('fValor').value);
  const cat   = document.getElementById('fCat').value;
  const tipo  = document.getElementById('fTipo').value;
  if (!desc || !valor || valor <= 0 || !data) { showToast('⚠️ Preencha tudo!'); return; }
  gastos.push({ id: Date.now(), data, desc, cat, tipo, valor });
  save();
  const d = new Date(data + 'T00:00:00');
  if (d.getFullYear() === cfg.ano) selMon = d.getMonth();
  document.getElementById('fDesc').value = '';
  document.getElementById('fValor').value = '';
  document.getElementById('fData').value = todayStr();
  closeSheets();
  renderAll();
  showToast('✅ Gasto adicionado!');
}

function delGasto(id) {
  gastos = gastos.filter(g => g.id !== id);
  save(); renderAll(); showToast('🗑️ Removido');
}

// ── RENDER ALL ───────────────────────────────────────────────
function renderAll() { renderHome(); renderMonthTabs(); renderList(); }

// ── HELPERS ──────────────────────────────────────────────────
function getMes(m, y) {
  return gastos.filter(g => {
    const d = new Date(g.data + 'T00:00:00');
    return d.getFullYear() === (y||cfg.ano) && d.getMonth() === m;
  });
}
function fmt(v) { return 'R$\u00A0' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { const [y,m,day]=d.split('-'); return day+'/'+m; }
function updatePill() {
  document.getElementById('monthPillText').textContent = MN[selMon]+' '+cfg.ano;
}

// ── HOME ─────────────────────────────────────────────────────
function renderHome() {
  updatePill();
  const mes   = getMes(selMon);
  const total = mes.reduce((s,g)=>s+g.valor,0);
  const saldo = cfg.sal - total;
  const pct   = cfg.sal ? total/cfg.sal : 0;
  const metaOk = saldo >= cfg.meta;
  const pc = pct > .9 ? '#ff5c6a' : pct > .7 ? '#ffcb47' : '#00d68f';

  // Hero
  document.getElementById('heroCard').innerHTML = `
    <div class="hero-label">Saldo — ${MF[selMon]}</div>
    <div class="hero-value" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(saldo)}</div>
    <div class="hero-row">
      <div class="hero-mini">
        <div class="hero-mini-label">Salário</div>
        <div class="hero-mini-val" style="color:var(--green)">${fmt(cfg.sal)}</div>
      </div>
      <div class="hero-mini">
        <div class="hero-mini-label">Gasto</div>
        <div class="hero-mini-val" style="color:var(--red)">${fmt(total)}</div>
      </div>
      <div class="hero-mini">
        <div class="hero-mini-label">Meta</div>
        <div class="hero-mini-val" style="color:var(--yellow)">${metaOk?'✅':fmt(cfg.meta-saldo)+' falta'}</div>
      </div>
    </div>
  `;

  // Progress
  document.getElementById('progWrap').innerHTML = `
    <div class="prog-head">
      <span style="color:var(--sub)">Comprometido</span>
      <span style="color:${pc};font-weight:700">${(pct*100).toFixed(1)}%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" style="width:${Math.min(pct*100,100)}%;background:${pc}"></div>
    </div>
  `;

  // Mini cards
  const fixo = mes.filter(g=>g.tipo==='Fixo').reduce((s,g)=>s+g.valor,0);
  const vari = mes.filter(g=>g.tipo==='Variável').reduce((s,g)=>s+g.valor,0);
  document.getElementById('miniCards').innerHTML = `
    <div class="mini-card">
      <div class="mini-card-label">Fixos</div>
      <div class="mini-card-val" style="color:var(--blue)">${fmt(fixo)}</div>
    </div>
    <div class="mini-card">
      <div class="mini-card-label">Variáveis</div>
      <div class="mini-card-val" style="color:var(--yellow)">${fmt(vari)}</div>
    </div>
  `;

  // Pie
  const cats = {};
  mes.forEach(g => cats[g.cat] = (cats[g.cat]||0) + g.valor);
  const lbs = Object.keys(cats), vs = Object.values(cats);
  const pieEmpty = document.getElementById('pieEmpty');
  const pieCanvas = document.getElementById('pieChart');
  if (!lbs.length) { pieCanvas.style.display='none'; pieEmpty.style.display=''; }
  else {
    pieCanvas.style.display=''; pieEmpty.style.display='none';
    if (charts.pie) charts.pie.destroy();
    charts.pie = new Chart(pieCanvas, {
      type:'doughnut',
      data:{ labels:lbs, datasets:[{ data:vs, backgroundColor:lbs.map(l=>CC[l]||'#6b748a'), borderWidth:2, borderColor:'#13161f' }] },
      options:{ cutout:'62%', plugins:{ legend:{ position:'bottom', labels:{ color:'#6b748a', font:{family:'Plus Jakarta Sans',size:11}, boxWidth:10, padding:12 } } } }
    });
  }

  // Line
  const mTotals = MN.map((_,i) => getMes(i).reduce((s,g)=>s+g.valor,0));
  if (charts.line) charts.line.destroy();
  charts.line = new Chart(document.getElementById('lineChart'), {
    type:'line',
    data:{ labels:MN, datasets:[
      { label:'Gastos', data:mTotals, borderColor:'#ff5c6a', backgroundColor:'rgba(255,92,106,.08)', fill:true, tension:.4, pointRadius:3, pointBackgroundColor:'#ff5c6a' },
      { label:'Salário', data:MN.map(()=>cfg.sal), borderColor:'#00d68f', borderDash:[5,4], borderWidth:1.5, pointRadius:0, fill:false }
    ]},
    options:{ plugins:{ legend:{ labels:{ color:'#6b748a', font:{family:'Plus Jakarta Sans',size:11}, boxWidth:10, padding:12 } } },
      scales:{ x:{ticks:{color:'#6b748a',font:{size:10}},grid:{color:'#1a1e2a'}}, y:{ticks:{color:'#6b748a',font:{size:10},callback:v=>'R$'+Math.round(v)},grid:{color:'#1a1e2a'}} } }
  });
}

// ── MONTH TABS ────────────────────────────────────────────────
function renderMonthTabs() {
  const wrap = document.getElementById('monthTabs');
  wrap.innerHTML = MN.map((m,i)=>{
    const cnt = getMes(i).length;
    return `<div class="m-tab ${i===selMon?'active':''}" onclick="selMon=${i};renderAll();showPage('lancamentos')">
      ${m}<span class="m-tab-count">${cnt||''}</span>
    </div>`;
  }).join('');
  // scroll active into view
  setTimeout(()=>{
    const active = wrap.querySelector('.m-tab.active');
    if (active) active.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
  },50);
}

// ── LIST ──────────────────────────────────────────────────────
function renderList() {
  const mes = getMes(selMon).sort((a,b)=> new Date(b.data)-new Date(a.data));
  document.getElementById('lancTitle').textContent = MF[selMon]+' — '+mes.length+' gasto'+(mes.length!==1?'s':'');

  // filter chips
  const allCats = [...new Set(mes.map(g=>g.cat))];
  document.getElementById('filterChips').innerHTML = allCats.length < 2 ? '' :
    ['Todos',...allCats].map(c=>`
      <div class="cat-chip ${(c==='Todos'&&!filterCat)||(c===filterCat)?'active':''}"
        style="${c!=='Todos'?`border-color:${CC[c]||'#94a3b8'};color:${(c===filterCat)?'#000':'inherit'};background:${c===filterCat?CC[c]||'#94a3b8':''}`:''}"
        onclick="filterCat=${c==='Todos'?'null':`'${c}'`};renderList()">${c}</div>
    `).join('');

  const filtered = filterCat ? mes.filter(g=>g.cat===filterCat) : mes;
  const el = document.getElementById('gastosList');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="ei">📭</div><p>Nenhum gasto em ${MF[selMon]}.<br>Toque no <b>+</b> para adicionar!</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(g=>`
    <div class="gasto-item">
      <div class="gasto-icon" style="background:${CC[g.cat]||'#6b748a'}22">
        ${g.cat.split(' ')[0]}
      </div>
      <div class="gasto-info">
        <div class="gasto-desc">${g.desc}</div>
        <div class="gasto-meta">${fmtDate(g.data)} · ${g.cat.replace(/^\S+\s/,'')} · <span style="color:${g.tipo==='Fixo'?'#4d9fff':'#ff8c42'}">${g.tipo}</span></div>
      </div>
      <div class="gasto-val">${fmt(g.valor)}</div>
      <button class="gasto-del" onclick="delGasto(${g.id})">✕</button>
    </div>
  `).join('');
}

// ── ANUAL ─────────────────────────────────────────────────────
function renderAnual() {
  const all   = gastos.filter(g=>new Date(g.data+'T00:00:00').getFullYear()===cfg.ano);
  const total = all.reduce((s,g)=>s+g.valor,0);
  const eco   = cfg.sal*12 - total;
  const media = total/12;

  document.getElementById('anualCards').innerHTML = `
    <div class="mini-card">
      <div class="mini-card-label">Total Gasto</div>
      <div class="mini-card-val" style="color:var(--red)">${fmt(total)}</div>
    </div>
    <div class="mini-card">
      <div class="mini-card-label">Economia</div>
      <div class="mini-card-val" style="color:${eco>=0?'var(--green)':'var(--red)'}">${fmt(eco)}</div>
    </div>
    <div class="mini-card">
      <div class="mini-card-label">Renda Anual</div>
      <div class="mini-card-val" style="color:var(--green)">${fmt(cfg.sal*12)}</div>
    </div>
    <div class="mini-card">
      <div class="mini-card-label">Média Mensal</div>
      <div class="mini-card-val" style="color:var(--yellow)">${fmt(media)}</div>
    </div>
  `;

  const gM = MN.map((_,i)=>getMes(i).reduce((s,g)=>s+g.valor,0));
  const eM = gM.map(v=>Math.max(0,cfg.sal-v));
  if (charts.bar) charts.bar.destroy();
  charts.bar = new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{ labels:MN, datasets:[
      { label:'Gastos',  data:gM, backgroundColor:'rgba(255,92,106,.75)',  borderRadius:5 },
      { label:'Economia',data:eM, backgroundColor:'rgba(0,214,143,.45)', borderRadius:5 }
    ]},
    options:{ plugins:{ legend:{ labels:{ color:'#6b748a',font:{family:'Plus Jakarta Sans',size:11},boxWidth:10,padding:12 } } },
      scales:{ x:{ticks:{color:'#6b748a',font:{size:10}},grid:{color:'#1a1e2a'}}, y:{ticks:{color:'#6b748a',font:{size:10},callback:v=>'R$'+Math.round(v)},grid:{color:'#1a1e2a'}} } }
  });

  const cats = {};
  all.forEach(g=>cats[g.cat]=(cats[g.cat]||0)+g.valor);
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const maxV = sorted[0]?.[1]||1;
  document.getElementById('annualCats').innerHTML = !sorted.length
    ? '<div class="empty"><div class="ei">📊</div><p>Sem dados ainda</p></div>'
    : sorted.map(([cat,v])=>`
      <div class="ann-row">
        <div class="ann-cat" style="color:${CC[cat]||'#6b748a'}">${cat}</div>
        <div class="ann-bar-wrap">
          <div class="ann-bar">
            <div class="ann-bar-fill" style="width:${(v/maxV*100).toFixed(1)}%;background:${CC[cat]||'#6b748a'}"></div>
          </div>
          <div style="font-size:.65rem;color:var(--sub);margin-top:2px">${total?((v/total)*100).toFixed(1)+'%':''}</div>
        </div>
        <div class="ann-val" style="color:var(--red)">${fmt(v)}</div>
      </div>
    `).join('');
}

// ── EXPORT ────────────────────────────────────────────────────
function exportCSV() {
  const mes = getMes(selMon);
  if (!mes.length) { showToast('⚠️ Sem dados'); return; }
  let csv = 'Data,Descrição,Categoria,Tipo,Valor\n';
  mes.forEach(g=>csv+=`${g.data},"${g.desc}","${g.cat}","${g.tipo}",${g.valor.toFixed(2)}\n`);
  dl(csv, `gastos_${MF[selMon]}_${cfg.ano}.csv`);
  showToast('📥 CSV exportado!');
}
function exportCSVAnual() {
  const all = gastos.filter(g=>new Date(g.data+'T00:00:00').getFullYear()===cfg.ano);
  if (!all.length) { showToast('⚠️ Sem dados'); return; }
  let csv = 'Data,Descrição,Categoria,Tipo,Valor\n';
  all.sort((a,b)=>a.data.localeCompare(b.data)).forEach(g=>csv+=`${g.data},"${g.desc}","${g.cat}","${g.tipo}",${g.valor.toFixed(2)}\n`);
  dl(csv, `gastos_anual_${cfg.ano}.csv`);
  showToast('📥 CSV anual exportado!');
}
function dl(c, f) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+c],{type:'text/csv;charset=utf-8;'}));
  a.download = f; a.click();
}

// ── TOAST ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── SWIPE CLOSE SHEET ────────────────────────────────────────
let touchY = 0;
document.querySelectorAll('.sheet').forEach(s=>{
  s.addEventListener('touchstart', e=>{ touchY = e.touches[0].clientY; }, {passive:true});
  s.addEventListener('touchend',   e=>{
    if (e.changedTouches[0].clientY - touchY > 60) closeSheets();
  }, {passive:true});
});
</script>
</body>
